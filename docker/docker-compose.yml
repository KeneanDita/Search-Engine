version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Hybrid Search Engine — Full Stack
# ──────────────────────────────────────────────────────────────────────────────

networks:
  search-net:
    driver: bridge

volumes:
  postgres_data:
  opensearch_data:
  redis_data:
  nlp_model_cache:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

# ──────────────────────────────────────────────────────────────────────────────
# INFRASTRUCTURE
# ──────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-searchengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-searchengine}
      POSTGRES_DB: ${POSTGRES_DB:-searchengine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../shared/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - search-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-searchengine} -d ${POSTGRES_DB:-searchengine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── OpenSearch ──────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    <<: *default-restart
    environment:
      - cluster.name=search-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - plugins.ml_commons.only_run_on_ml_node=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - search-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    <<: *default-restart
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    networks:
      - search-net
    logging: *default-logging
    profiles:
      - dashboards

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *default-restart
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - search-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

# ──────────────────────────────────────────────────────────────────────────────
# PYTHON SERVICES
# ──────────────────────────────────────────────────────────────────────────────

  python-crawler:
    build:
      context: ../services/python-crawler
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      USE_PLAYWRIGHT: ${USE_PLAYWRIGHT:-false}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      STACKEXCHANGE_KEY: ${STACKEXCHANGE_KEY:-}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    ports:
      - "8000:8000"
    networks:
      - search-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  python-nlp:
    build:
      context: ../services/python-nlp
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      INDEXER_URL: http://go-indexer:8081
      NLP_BATCH_SIZE: ${NLP_BATCH_SIZE:-16}
      MAX_TEXT_CHARS: ${MAX_TEXT_CHARS:-8000}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    volumes:
      - nlp_model_cache:/root/.cache/huggingface
    ports:
      - "8001:8001"
    networks:
      - search-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2g
    logging: *default-logging

# ──────────────────────────────────────────────────────────────────────────────
# GO SERVICES
# ──────────────────────────────────────────────────────────────────────────────

  go-indexer:
    build:
      context: ../services/go-indexer
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      PORT: 8081
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgres://${POSTGRES_USER:-searchengine}:${POSTGRES_PASSWORD:-searchengine}@postgres:5432/${POSTGRES_DB:-searchengine}?sslmode=disable
      OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8081:8081"
    networks:
      - search-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  go-api:
    build:
      context: ../services/go-api
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      go-indexer:
        condition: service_healthy
      python-nlp:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8080
      REDIS_URL: redis://redis:6379
      OPENSEARCH_URL: http://opensearch:9200
      NLP_URL: http://python-nlp:8001
      RATE_RPS: ${RATE_RPS:-20}
      RATE_BURST: ${RATE_BURST:-50}
    ports:
      - "8080:8080"
    networks:
      - search-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

# ──────────────────────────────────────────────────────────────────────────────
# OBSERVABILITY (optional, activate with --profile monitoring)
# ──────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    <<: *default-restart
    volumes:
      - ../shared/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - search-net
    profiles:
      - monitoring
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.2
    <<: *default-restart
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../shared/configs/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - search-net
    profiles:
      - monitoring
    logging: *default-logging
